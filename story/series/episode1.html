<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Новенький — Серия 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="background" id="background"></div>
        <div class="fade-overlay" id="fadeOverlay"></div>
        
        <div class="side-text-left">GANGS•GANGS•GANGS</div>
        <div class="side-text-right">STREET•STREET•STREET</div>
        
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        
        <div class="avatar-container">
            <img class="avatar" id="avatarImg" src="" alt="avatar">
        </div>
        
        <div class="dialogue-box" id="dialogueBox">
            <div class="speaker-name" id="speakerName"></div>
            <div class="dialogue-text" id="dialogueText"></div>
            <div class="continue-hint">▼ нажми в любом месте ▼</div>
        </div>
        
        <div class="choices-panel" id="choicesPanel">
            <div class="choices-title">⚡ ЧТО ДЕЛАТЬ? ⚡</div>
            <div id="choicesList"></div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="status-badge">СЕРИЯ 1: НОВЕНЬКИЙ</div>
        <div class="back-to-menu" id="backToMenu">🏠 МЕНЮ</div>
    </div>
    <script src="script1.js"></script>
</body>
</html>
